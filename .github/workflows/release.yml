name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.plan.outputs.release }}
      version: ${{ steps.plan.outputs.version }}
      release_label: ${{ steps.release-label.outputs.release_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release label from merged pull request
        id: release-label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const managedLabels = ['release-feature', 'release-fix', 'chore'];

            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const mergedPull = pulls.find((pr) => pr.merged_at) ?? pulls[0];
            if (!mergedPull) {
              core.info(`No associated pull request found for ${sha}; defaulting to chore.`);
              core.setOutput('release_label', 'chore');
              return;
            }

            const labelNames = mergedPull.labels.map((label) => label.name);
            const resolved = managedLabels.find((name) => labelNames.includes(name)) ?? 'chore';

            core.info(`Using label '${resolved}' from PR #${mergedPull.number}.`);
            core.setOutput('release_label', resolved);

      - name: Plan release
        id: plan
        shell: bash
        run: |
          ./scripts/release.sh plan --release-label '${{ steps.release-label.outputs.release_label }}'

      - name: Stop when no release is needed
        if: steps.plan.outputs.release != 'true'
        shell: bash
        run: |
          echo "No release needed for label: ${{ steps.release-label.outputs.release_label }}"

  build:
    if: needs.plan.outputs.release == 'true'
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            binary_path: ./bin/Release/ciso2iso.exe
            binary_name: ciso2iso.exe
          - os: ubuntu-latest
            target: linux-x64
            binary_path: ./build/ciso2iso
            binary_name: ciso2iso

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msbuild = (Get-Command msbuild.exe).Source
          $env:MSBUILD_EXE = $msbuild
          powershell -ExecutionPolicy Bypass -File .\tests\smoke.ps1

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./tests/smoke.sh

      - name: Package release asset
        id: package
        shell: bash
        run: |
          ./scripts/release.sh package \
            --version '${{ needs.plan.outputs.version }}' \
            --exe-path '${{ matrix.binary_path }}' \
            --binary-name '${{ matrix.binary_name }}' \
            --target '${{ matrix.target }}'

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_path }}

  publish:
    if: needs.plan.outputs.release == 'true'
    needs:
      - plan
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: dist

      - name: Create and publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*
