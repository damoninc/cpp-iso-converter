name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.plan.outputs.release }}
      version: ${{ steps.plan.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Plan release
        id: plan
        shell: bash
        run: |
          ./scripts/release.sh plan

      - name: Stop when no release is needed
        if: steps.plan.outputs.release != 'true'
        shell: bash
        run: |
          echo 'No feat: or fix: commits found since the latest tag.'

  build:
    if: needs.plan.outputs.release == 'true'
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            binary_path: ./bin/Release/ciso2iso.exe
            binary_name: ciso2iso.exe
          - os: ubuntu-latest
            target: linux-x64
            binary_path: ./build/ciso2iso
            binary_name: ciso2iso

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msbuild = (Get-Command msbuild.exe).Source
          $env:MSBUILD_EXE = $msbuild
          powershell -ExecutionPolicy Bypass -File .\tests\smoke.ps1

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./tests/smoke.sh

      - name: Package release asset
        id: package
        shell: bash
        run: |
          ./scripts/release.sh package \
            --version '${{ needs.plan.outputs.version }}' \
            --exe-path '${{ matrix.binary_path }}' \
            --binary-name '${{ matrix.binary_name }}' \
            --target '${{ matrix.target }}'

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_path }}

  publish:
    if: needs.plan.outputs.release == 'true'
    needs:
      - plan
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: dist

      - name: Create and publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*
