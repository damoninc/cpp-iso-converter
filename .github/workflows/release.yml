name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Plan release
        id: plan
        shell: pwsh
        run: |
          .\scripts\release.ps1 plan

      - name: Stop when no release is needed
        if: steps.plan.outputs.release != 'true'
        shell: pwsh
        run: |
          Write-Host 'No feat: or fix: commits found since the latest tag.'

      - name: Build release binary
        if: steps.plan.outputs.release == 'true'
        shell: pwsh
        run: |
          $msbuild = (Get-Command msbuild.exe).Source
          $env:MSBUILD_EXE = $msbuild
          powershell -ExecutionPolicy Bypass -File .\tests\smoke.ps1

      - name: Package release asset
        if: steps.plan.outputs.release == 'true'
        id: package
        shell: pwsh
        run: |
          .\scripts\release.ps1 package `
            -Version '${{ steps.plan.outputs.version }}' `
            -ExePath '.\bin\Release\ciso2iso.exe'

      - name: Create and publish GitHub Release
        if: steps.plan.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plan.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package.outputs.asset_path }}
